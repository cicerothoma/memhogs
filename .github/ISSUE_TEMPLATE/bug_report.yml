name: Bug report
description: Wrong numbers, wrong grouping, crashes
title: "[bug] "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: memhogs version
      description: Output of `memhogs --version`
      placeholder: memhogs 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: macOS 26.5 arm64 / Ubuntu 24.04 amd64
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include the command you ran and its output where possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
