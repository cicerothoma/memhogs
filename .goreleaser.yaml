version: 2
project_name: memhogs

# Releases run locally on macOS (`goreleaser release --clean`): the darwin
# builds need cgo for libproc (memory footprint), which cannot be
# cross-compiled from Linux CI; the linux builds are pure Go and cross-compile
# fine from here.
builds:
  - id: darwin
    goos: [darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=1]
    ldflags: ["-s -w -X main.version={{.Version}}"]
  - id: linux
    goos: [linux]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags: ["-s -w -X main.version={{.Version}}"]

archives:
  - formats: [tar.gz]

nfpms:
  - ids: [linux]
    formats: [deb, rpm, apk]
    maintainer: Collins Thomas <thomascollins582@gmail.com>
    homepage: https://github.com/cicerothoma/memhogs
    description: Apps and services by memory use, grouped by process tree.
    license: MIT

# Casks replaced the deprecated generated formulas (gone in goreleaser
# v2.16). Casks are macOS-only, so Linux brew is no longer an install path;
# Linux users get the deb/rpm/apk or tarball. The binaries are not signed or
# notarized, so the post-install hook strips Gatekeeper's quarantine flag —
# without it macOS refuses to run the downloaded binary.
homebrew_casks:
  - repository:
      owner: cicerothoma
      name: homebrew-tap
    homepage: https://github.com/cicerothoma/memhogs
    description: Apps and services by memory use, grouped by process tree.
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/memhogs"]
          end

changelog:
  use: github-native
