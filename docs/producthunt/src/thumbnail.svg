<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141926"/>
      <stop offset="1" stop-color="#0a0c12"/>
    </linearGradient>
  </defs>

  <!-- rounded app tile -->
